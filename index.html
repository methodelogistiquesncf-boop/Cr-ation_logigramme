<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éditeur de Logigrammes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      background: #f5f7fa;
    }

    /* Transitions fluides */
    ::view-transition-group(*),
    ::view-transition-old(*),
    ::view-transition-new(*) {
      animation-duration: 0.25s;
      animation-timing-function: cubic-bezier(0.19, 1, 0.22, 1);
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Barre d'outils gauche */
    .toolbar {
      width: 220px;
      background: white;
      border-right: 1px solid #e1e4e8;
      padding: 20px;
      overflow-y: auto;
    }

    .toolbar h3 {
      font-size: 14px;
      color: #586069;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .shape-item {
      padding: 12px;
      margin-bottom: 10px;
      border: 2px solid #e1e4e8;
      border-radius: 8px;
      cursor: grab;
      transition: all 0.2s;
      background: white;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shape-item:hover {
      border-color: #0366d6;
      transform: translateX(4px);
      box-shadow: 0 2px 8px rgba(3, 102, 214, 0.1);
    }

    .shape-item:active {
      cursor: grabbing;
    }

    .shape-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shape-label {
      font-size: 13px;
      font-weight: 500;
      color: #24292e;
    }

    .divider {
      height: 1px;
      background: #e1e4e8;
      margin: 20px 0;
    }

    /* Canvas central */
    .canvas-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .top-toolbar {
      background: white;
      border-bottom: 1px solid #e1e4e8;
      padding: 12px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 16px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover {
      background: #f6f8fa;
      border-color: #0366d6;
    }

    .btn.active {
      background: #0366d6;
      color: white;
      border-color: #0366d6;
    }

    .btn-export {
      background: #28a745;
      color: white;
      border-color: #28a745;
      margin-left: auto;
    }

    .btn-export:hover {
      background: #22863a;
    }

    .btn-clear {
      background: #d73a49;
      color: white;
      border-color: #d73a49;
    }

    .btn-clear:hover {
      background: #cb2431;
    }

    .arrow-type-selector {
      display: flex;
      gap: 5px;
      padding: 4px;
      background: #f6f8fa;
      border-radius: 6px;
      border: 1px solid #e1e4e8;
    }

    .arrow-type-btn {
      padding: 6px 12px;
      border: 1px solid transparent;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .arrow-type-btn:hover {
      background: white;
    }

    .arrow-type-btn.active {
      background: white;
      border-color: #0366d6;
      color: #0366d6;
      font-weight: 600;
    }

    #canvas {
      flex: 1;
      position: relative;
      background: 
        linear-gradient(90deg, #e1e4e8 1px, transparent 1px),
        linear-gradient(#e1e4e8 1px, transparent 1px);
      background-size: 20px 20px;
      overflow: auto;
      cursor: default;
    }

    #canvas.arrow-mode {
      cursor: crosshair;
    }

    /* Blocs sur le canvas */
    .node {
      position: absolute;
      min-width: 120px;
      padding: 15px 20px;
      border: 2px solid #0366d6;
      border-radius: 8px;
      background: white;
      cursor: move;
      user-select: none;
      transition: box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
    }

    .node:hover {
      box-shadow: 0 4px 12px rgba(3, 102, 214, 0.2);
      z-index: 10;
    }

    .node.selected {
      box-shadow: 0 0 0 3px rgba(3, 102, 214, 0.3);
      z-index: 11;
    }

    .node.connecting {
      box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.5);
      z-index: 11;
    }

    .node.terminal {
      border-radius: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
    }

    .node.process {
      border-radius: 8px;
    }

    .node.decision {
      transform: rotate(45deg);
      border-radius: 8px;
    }

    .node.decision .node-text {
      transform: rotate(-45deg);
    }

    .node.io {
      clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
      border-radius: 0;
    }

    .node.document {
      border-radius: 8px 8px 0 0;
      position: relative;
    }

    .node.document::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: -2px;
      right: -2px;
      height: 10px;
      border: 2px solid;
      border-color: inherit;
      border-top: none;
      border-radius: 0 0 50% 50%;
      background: inherit;
    }

    /* Point de connexion central */
    .connection-point {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #28a745;
      border: 2px solid white;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .node:hover .connection-point,
    .node.connecting .connection-point {
      opacity: 1;
    }

    /* Connexions */
    svg.connections {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .connection-line {
      stroke: #586069;
      stroke-width: 2;
      fill: none;
      pointer-events: stroke;
      cursor: pointer;
    }

    .connection-line:hover {
      stroke: #0366d6;
      stroke-width: 3;
    }

    .connection-line.selected {
      stroke: #0366d6;
      stroke-width: 3;
    }

    .connection-label {
      font-size: 12px;
      fill: #586069;
      pointer-events: none;
      font-weight: 600;
    }

    .connection-label-bg {
      fill: white;
      stroke: #e1e4e8;
      stroke-width: 1;
    }

    /* Propriétés */
    .properties {
      width: 280px;
      background: white;
      border-left: 1px solid #e1e4e8;
      padding: 20px;
      overflow-y: auto;
    }

    .properties h3 {
      font-size: 16px;
      margin-bottom: 20px;
      color: #24292e;
    }

    .prop-group {
      margin-bottom: 20px;
    }

    .prop-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #586069;
    }

    .prop-group input[type="text"],
    .prop-group textarea,
    .prop-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
    }

    .prop-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .prop-group input[type="color"] {
      width: 100%;
      height: 40px;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      cursor: pointer;
    }

    .color-presets {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 8px;
    }

    .color-preset {
      width: 100%;
      height: 32px;
      border: 2px solid #e1e4e8;
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .color-preset:hover {
      transform: scale(1.1);
      border-color: #0366d6;
    }

    .empty-state {
      text-align: center;
      color: #959da5;
      font-size: 13px;
      margin-top: 40px;
    }

    .arrow-preview {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      padding: 10px;
      background: #f6f8fa;
      border-radius: 6px;
    }

    .arrow-preview-item {
      flex: 1;
      text-align: center;
      padding: 8px;
      border: 2px solid #e1e4e8;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .arrow-preview-item:hover {
      border-color: #0366d6;
    }

    .arrow-preview-item.selected {
      border-color: #0366d6;
      background: #f1f8ff;
    }

    .arrow-preview svg {
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Barre d'outils gauche -->
    <div class="toolbar">
      <h3>📦 Formes</h3>
      
      <div class="shape-item" draggable="true" data-type="terminal">
        <div class="shape-icon">
          <svg width="40" height="24" viewBox="0 0 40 24">
            <rect width="40" height="24" rx="12" fill="#667eea" stroke="#5568d3" stroke-width="2"/>
          </svg>
        </div>
        <div class="shape-label">Début/Fin</div>
      </div>

      <div class="shape-item" draggable="true" data-type="process">
        <div class="shape-icon">
          <svg width="40" height="24" viewBox="0 0 40 24">
            <rect width="40" height="24" rx="4" fill="white" stroke="#0366d6" stroke-width="2"/>
          </svg>
        </div>
        <div class="shape-label">Processus</div>
      </div>

      <div class="shape-item" draggable="true" data-type="decision">
        <div class="shape-icon">
          <svg width="30" height="30" viewBox="0 0 30 30">
            <rect x="15" y="0" width="21" height="21" transform="rotate(45 15 15)" fill="white" stroke="#f59e0b" stroke-width="2"/>
          </svg>
        </div>
        <div class="shape-label">Décision</div>
      </div>

      <div class="shape-item" draggable="true" data-type="io">
        <div class="shape-icon">
          <svg width="40" height="24" viewBox="0 0 40 24">
            <path d="M4 0 L40 0 L36 24 L0 24 Z" fill="white" stroke="#10b981" stroke-width="2"/>
          </svg>
        </div>
        <div class="shape-label">Entrée/Sortie</div>
      </div>

      <div class="shape-item" draggable="true" data-type="document">
        <div class="shape-icon">
          <svg width="40" height="28" viewBox="0 0 40 28">
            <rect width="40" height="20" fill="white" stroke="#8b5cf6" stroke-width="2"/>
            <path d="M0 20 Q10 25 20 20 T40 20 L40 24 Q30 19 20 24 T0 24 Z" fill="white" stroke="#8b5cf6" stroke-width="2"/>
          </svg>
        </div>
        <div class="shape-label">Document</div>
      </div>

      <div class="divider"></div>

      <h3>➜ Types de flèches</h3>
      
      <div class="arrow-preview">
        <div class="arrow-preview-item selected" data-arrow="simple">
          <svg width="50" height="20" viewBox="0 0 50 20">
            <defs>
              <marker id="preview-simple" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
                <polygon points="0 0, 8 2.5, 0 5" fill="#586069"/>
              </marker>
            </defs>
            <line x1="5" y1="10" x2="45" y2="10" stroke="#586069" stroke-width="2" marker-end="url(#preview-simple)"/>
          </svg>
          <div style="font-size: 10px; margin-top: 4px;">Simple</div>
        </div>
        <div class="arrow-preview-item" data-arrow="double">
          <svg width="50" height="20" viewBox="0 0 50 20">
            <defs>
              <marker id="preview-double" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
                <polygon points="0 0, 8 2.5, 0 5" fill="#586069"/>
              </marker>
            </defs>
            <line x1="5" y1="10" x2="45" y2="10" stroke="#586069" stroke-width="2" marker-end="url(#preview-double)" marker-start="url(#preview-double)"/>
          </svg>
          <div style="font-size: 10px; margin-top: 4px;">Double</div>
        </div>
      </div>

      <div class="arrow-preview">
        <div class="arrow-preview-item" data-arrow="dashed">
          <svg width="50" height="20" viewBox="0 0 50 20">
            <defs>
              <marker id="preview-dashed" markerWidth="8" markerHeight="8" refX="7" refY="2.5" orient="auto">
                <polygon points="0 0, 8 2.5, 0 5" fill="#586069"/>
              </marker>
            </defs>
            <line x1="5" y1="10" x2="45" y2="10" stroke="#586069" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#preview-dashed)"/>
          </svg>
          <div style="font-size: 10px; margin-top: 4px;">Pointillé</div>
        </div>
        <div class="arrow-preview-item" data-arrow="thick">
          <svg width="50" height="20" viewBox="0 0 50 20">
            <defs>
              <marker id="preview-thick" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
                <polygon points="0 0, 10 3, 0 6" fill="#586069"/>
              </marker>
            </defs>
            <line x1="5" y1="10" x2="45" y2="10" stroke="#586069" stroke-width="3" marker-end="url(#preview-thick)"/>
          </svg>
          <div style="font-size: 10px; margin-top: 4px;">Épaisse</div>
        </div>
      </div>
    </div>

    <!-- Zone centrale -->
    <div class="canvas-wrapper">
      <div class="top-toolbar">
        <button class="btn" id="arrowBtn">
          <span>➜</span>
          Créer flèche
        </button>
        <div class="arrow-type-selector" id="arrowTypeSelector" style="display: none;">
          <button class="arrow-type-btn active" data-type="simple">Simple</button>
          <button class="arrow-type-btn" data-type="double">Double</button>
          <button class="arrow-type-btn" data-type="dashed">Pointillé</button>
          <button class="arrow-type-btn" data-type="thick">Épaisse</button>
        </div>
        <button class="btn" id="undoBtn">
          <span>↶</span>
          Annuler
        </button>
        <button class="btn btn-clear" id="clearBtn">
          <span>🗑</span>
          Vider
        </button>
        <button class="btn btn-export" id="exportBtn">
          <span>💾</span>
          Exporter SVG
        </button>
      </div>

      <div id="canvas">
        <svg class="connections" id="connectionsSvg">
          <defs>
            <marker id="arrowSimple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
              <polygon points="0 0, 10 3, 0 6" fill="#586069"/>
            </marker>
            <marker id="arrowSimple-selected" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
              <polygon points="0 0, 10 3, 0 6" fill="#0366d6"/>
            </marker>
            <marker id="arrowThick" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
              <polygon points="0 0, 12 4, 0 8" fill="#586069"/>
            </marker>
            <marker id="arrowThick-selected" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
              <polygon points="0 0, 12 4, 0 8" fill="#0366d6"/>
            </marker>
          </defs>
        </svg>
      </div>
    </div>

    <!-- Panneau propriétés -->
    <div class="properties" id="properties">
      <div class="empty-state">
        👈 Sélectionnez un élément<br>pour modifier ses propriétés
      </div>
    </div>
  </div>

  <script>
    // État de l'application
    const state = {
      nodes: [],
      connections: [],
      selectedNode: null,
      selectedConnection: null,
      arrowMode: false,
      arrowStart: null,
      currentArrowType: 'simple',
      history: [],
      nodeCounter: 0,
      connectionCounter: 0
    };

    // Références DOM
    const canvas = document.getElementById('canvas');
    const connectionsSvg = document.getElementById('connectionsSvg');
    const properties = document.getElementById('properties');
    const arrowBtn = document.getElementById('arrowBtn');
    const arrowTypeSelector = document.getElementById('arrowTypeSelector');
    const undoBtn = document.getElementById('undoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const exportBtn = document.getElementById('exportBtn');

    // Couleurs prédéfinies
    const colorPresets = [
      '#0366d6', '#28a745', '#d73a49', '#f59e0b', '#8b5cf6',
      '#06b6d4', '#ec4899', '#6366f1', '#10b981', '#f97316'
    ];

    // Configuration des types de nœuds
    const nodeTypes = {
      terminal: { label: 'Début/Fin', color: '#667eea' },
      process: { label: 'Processus', color: '#0366d6' },
      decision: { label: 'Décision', color: '#f59e0b' },
      io: { label: 'Entrée/Sortie', color: '#10b981' },
      document: { label: 'Document', color: '#8b5cf6' }
    };

    // Sélection du type de flèche dans la barre latérale
    document.querySelectorAll('.arrow-preview-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.arrow-preview-item').forEach(i => i.classList.remove('selected'));
        item.classList.add('selected');
        state.currentArrowType = item.dataset.arrow;
      });
    });

    // Sélection du type de flèche dans la barre du haut
    document.querySelectorAll('.arrow-type-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.arrow-type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.currentArrowType = btn.dataset.type;
      });
    });

    // Sauvegarder l'état dans l'historique
    function saveHistory() {
      state.history.push(JSON.stringify({
        nodes: state.nodes,
        connections: state.connections
      }));
      if (state.history.length > 50) state.history.shift();
    }

    // Annuler
    undoBtn.addEventListener('click', () => {
      if (state.history.length > 0) {
        const prev = JSON.parse(state.history.pop());
        state.nodes = prev.nodes;
        state.connections = prev.connections;
        state.selectedNode = null;
        state.selectedConnection = null;
        render();
      }
    });

    // Vider le canvas
    clearBtn.addEventListener('click', () => {
      if (confirm('Voulez-vous vraiment vider le logigramme ?')) {
        saveHistory();
        state.nodes = [];
        state.connections = [];
        state.selectedNode = null;
        state.selectedConnection = null;
        render();
      }
    });

    // Glisser-déposer depuis la barre d'outils
    document.querySelectorAll('.shape-item').forEach(item => {
      item.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('nodeType', item.dataset.type);
      });
    });

    canvas.addEventListener('dragover', (e) => {
      e.preventDefault();
    });

    canvas.addEventListener('drop', (e) => {
      e.preventDefault();
      const nodeType = e.dataTransfer.getData('nodeType');
      if (nodeType) {
        saveHistory();
        const rect = canvas.getBoundingClientRect();
        const node = {
          id: ++state.nodeCounter,
          type: nodeType,
          x: e.clientX - rect.left + canvas.scrollLeft - 60,
          y: e.clientY - rect.top + canvas.scrollTop - 20,
          text: nodeTypes[nodeType].label,
          color: nodeTypes[nodeType].color,
          width: 120,
          height: 40
        };
        state.nodes.push(node);
        render();
      }
    });

    // Mode flèche
    arrowBtn.addEventListener('click', () => {
      state.arrowMode = !state.arrowMode;
      arrowBtn.classList.toggle('active', state.arrowMode);
      arrowTypeSelector.style.display = state.arrowMode ? 'flex' : 'none';
      canvas.classList.toggle('arrow-mode', state.arrowMode);
      if (!state.arrowMode) {
        state.arrowStart = null;
        document.querySelectorAll('.node').forEach(n => n.classList.remove('connecting'));
      }
    });

    // Créer un nœud DOM
    function createNodeElement(node) {
      const div = document.createElement('div');
      div.className = `node ${node.type}`;
      div.style.left = node.x + 'px';
      div.style.top = node.y + 'px';
      div.style.borderColor = node.color;
      div.style.backgroundColor = node.type === 'terminal' ? node.color : 'white';
      div.style.color = node.type === 'terminal' ? 'white' : '#24292e';
      div.dataset.id = node.id;

      const textSpan = document.createElement('span');
      textSpan.className = 'node-text';
      textSpan.textContent = node.text;
      div.appendChild(textSpan);

      // Point de connexion central
      const connectionPoint = document.createElement('div');
      connectionPoint.className = 'connection-point';
      div.appendChild(connectionPoint);

      // Sélection
      div.addEventListener('click', (e) => {
        e.stopPropagation();
        
        if (state.arrowMode) {
          if (!state.arrowStart) {
            state.arrowStart = node;
            div.classList.add('connecting');
          } else if (state.arrowStart.id !== node.id) {
            saveHistory();
            state.connections.push({
              id: ++state.connectionCounter,
              from: state.arrowStart.id,
              to: node.id,
              label: '',
              arrowType: state.currentArrowType
            });
            document.querySelectorAll('.node').forEach(n => n.classList.remove('connecting'));
            state.arrowStart = null;
            render();
          }
        } else {
          selectNode(node);
        }
      });

      // Déplacement
      let isDragging = false;
      let startX, startY;

      div.addEventListener('mousedown', (e) => {
        if (state.arrowMode) return;
        isDragging = true;
        startX = e.clientX - node.x;
        startY = e.clientY - node.y;
        div.style.cursor = 'grabbing';
        e.preventDefault();
      });

      document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        node.x = e.clientX - startX;
        node.y = e.clientY - startY;
        div.style.left = node.x + 'px';
        div.style.top = node.y + 'px';
        renderConnections();
      });

      document.addEventListener('mouseup', () => {
        if (isDragging) {
          isDragging = false;
          div.style.cursor = 'move';
          saveHistory();
        }
      });

      if (state.selectedNode && state.selectedNode.id === node.id) {
        div.classList.add('selected');
      }

      // Stocker les dimensions après le rendu
      setTimeout(() => {
        const rect = div.getBoundingClientRect();
        node.width = rect.width;
        node.height = rect.height;
      }, 0);

      return div;
    }

    // Sélectionner un nœud
    function selectNode(node) {
      state.selectedNode = node;
      state.selectedConnection = null;
      renderProperties();
      render();
    }

    // Obtenir le centre d'un nœud
    function getNodeCenter(node) {
      const el = document.querySelector(`[data-id="${node.id}"]`);
      if (!el) return { x: node.x + 60, y: node.y + 20 };
      const rect = el.getBoundingClientRect();
      const canvasRect = canvas.getBoundingClientRect();
      return {
        x: rect.left - canvasRect.left + rect.width / 2 + canvas.scrollLeft,
        y: rect.top - canvasRect.top + rect.height / 2 + canvas.scrollTop
      };
    }

    // Dessiner les connexions (toujours droites)
    function renderConnections() {
      connectionsSvg.querySelectorAll('.connection-line, .connection-label, .connection-label-bg').forEach(el => el.remove());

      state.connections.forEach(conn => {
        const fromNode = state.nodes.find(n => n.id === conn.from);
        const toNode = state.nodes.find(n => n.id === conn.to);
        if (!fromNode || !toNode) return;

        const from = getNodeCenter(fromNode);
        const to = getNodeCenter(toNode);

        const isSelected = state.selectedConnection && state.selectedConnection.id === conn.id;

        // Ligne droite
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', from.x);
        line.setAttribute('y1', from.y);
        line.setAttribute('x2', to.x);
        line.setAttribute('y2', to.y);
        line.classList.add('connection-line');
        
        if (isSelected) {
          line.classList.add('selected');
        }

        // Appliquer le style selon le type de flèche
        switch (conn.arrowType) {
          case 'simple':
            line.setAttribute('stroke-width', '2');
            line.setAttribute('marker-end', isSelected ? 'url(#arrowSimple-selected)' : 'url(#arrowSimple)');
            break;
          case 'double':
            line.setAttribute('stroke-width', '2');
            line.setAttribute('marker-end', isSelected ? 'url(#arrowSimple-selected)' : 'url(#arrowSimple)');
            line.setAttribute('marker-start', isSelected ? 'url(#arrowSimple-selected)' : 'url(#arrowSimple)');
            break;
          case 'dashed':
            line.setAttribute('stroke-width', '2');
            line.setAttribute('stroke-dasharray', '5,4');
            line.setAttribute('marker-end', isSelected ? 'url(#arrowSimple-selected)' : 'url(#arrowSimple)');
            break;
          case 'thick':
            line.setAttribute('stroke-width', '4');
            line.setAttribute('marker-end', isSelected ? 'url(#arrowThick-selected)' : 'url(#arrowThick)');
            break;
        }

        line.style.pointerEvents = 'stroke';
        line.addEventListener('click', (e) => {
          e.stopPropagation();
          selectConnection(conn);
        });

        connectionsSvg.appendChild(line);

        // Label au milieu
        if (conn.label) {
          const midX = (from.x + to.x) / 2;
          const midY = (from.y + to.y) / 2;

          // Fond du label
          const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
          const textWidth = conn.label.length * 7 + 10;
          bg.setAttribute('x', midX - textWidth / 2);
          bg.setAttribute('y', midY - 16);
          bg.setAttribute('width', textWidth);
          bg.setAttribute('height', 20);
          bg.setAttribute('rx', '4');
          bg.classList.add('connection-label-bg');
          connectionsSvg.appendChild(bg);

          // Texte
          const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          text.setAttribute('x', midX);
          text.setAttribute('y', midY);
          text.setAttribute('text-anchor', 'middle');
          text.setAttribute('dominant-baseline', 'middle');
          text.classList.add('connection-label');
          text.textContent = conn.label;
          connectionsSvg.appendChild(text);
        }
      });
    }

    // Sélectionner une connexion
    function selectConnection(conn) {
      state.selectedConnection = conn;
      state.selectedNode = null;
      renderProperties();
      render();
    }

    // Afficher le panneau de propriétés
    function renderProperties() {
      if (state.selectedNode) {
        const node = state.selectedNode;
        properties.innerHTML = `
          <h3>✏️ Propriétés du bloc</h3>
          
          <div class="prop-group">
            <label>Texte</label>
            <textarea id="nodeText">${node.text}</textarea>
          </div>

          <div class="prop-group">
            <label>Couleur</label>
            <input type="color" id="nodeColor" value="${node.color}">
            <div class="color-presets">
              ${colorPresets.map(c => `<div class="color-preset" style="background:${c}" data-color="${c}"></div>`).join('')}
            </div>
          </div>

          <div class="prop-group">
            <button class="btn btn-clear" style="width:100%" id="deleteNode">🗑 Supprimer le bloc</button>
          </div>
        `;

        document.getElementById('nodeText').addEventListener('input', (e) => {
          node.text = e.target.value;
          render();
        });

        document.getElementById('nodeColor').addEventListener('input', (e) => {
          node.color = e.target.value;
          render();
        });

        document.querySelectorAll('.color-preset').forEach(preset => {
          preset.addEventListener('click', () => {
            node.color = preset.dataset.color;
            document.getElementById('nodeColor').value = node.color;
            render();
          });
        });

        document.getElementById('deleteNode').addEventListener('click', () => {
          saveHistory();
          state.nodes = state.nodes.filter(n => n.id !== node.id);
          state.connections = state.connections.filter(c => c.from !== node.id && c.to !== node.id);
          state.selectedNode = null;
          render();
        });

      } else if (state.selectedConnection) {
        const conn = state.selectedConnection;
        properties.innerHTML = `
          <h3>➜ Propriétés de la flèche</h3>
          
          <div class="prop-group">
            <label>Libellé (ex: Oui, Non...)</label>
            <input type="text" id="connLabel" value="${conn.label}" placeholder="Libellé optionnel">
          </div>

          <div class="prop-group">
            <label>Type de flèche</label>
            <select id="connArrowType">
              <option value="simple" ${conn.arrowType === 'simple' ? 'selected' : ''}>Simple</option>
              <option value="double" ${conn.arrowType === 'double' ? 'selected' : ''}>Double</option>
              <option value="dashed" ${conn.arrowType === 'dashed' ? 'selected' : ''}>Pointillé</option>
              <option value="thick" ${conn.arrowType === 'thick' ? 'selected' : ''}>Épaisse</option>
            </select>
          </div>

          <div class="prop-group">
            <button class="btn btn-clear" style="width:100%" id="deleteConn">🗑 Supprimer la connexion</button>
          </div>
        `;

        document.getElementById('connLabel').addEventListener('input', (e) => {
          conn.label = e.target.value;
          renderConnections();
        });

        document.getElementById('connArrowType').addEventListener('change', (e) => {
          conn.arrowType = e.target.value;
          renderConnections();
        });

        document.getElementById('deleteConn').addEventListener('click', () => {
          saveHistory();
          state.connections = state.connections.filter(c => c.id !== conn.id);
          state.selectedConnection = null;
          render();
        });

      } else {
        properties.innerHTML = `
          <div class="empty-state">
            👈 Sélectionnez un élément<br>pour modifier ses propriétés
          </div>
        `;
      }
    }

    // Rendu complet
    function render() {
      canvas.querySelectorAll('.node').forEach(el => el.remove());
      state.nodes.forEach(node => {
        canvas.appendChild(createNodeElement(node));
      });
      renderConnections();
      if (state.selectedNode || state.selectedConnection) {
        renderProperties();
      }
    }

    // Déselection au clic sur le canvas
    canvas.addEventListener('click', (e) => {
      if (e.target === canvas) {
        state.selectedNode = null;
        state.selectedConnection = null;
        renderProperties();
        render();
      }
    });

    // Export SVG
    exportBtn.addEventListener('click', () => {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      
      state.nodes.forEach(node => {
        const el = document.querySelector(`[data-id="${node.id}"]`);
        if (el) {
          const rect = el.getBoundingClientRect();
          minX = Math.min(minX, node.x);
          minY = Math.min(minY, node.y);
          maxX = Math.max(maxX, node.x + rect.width);
          maxY = Math.max(maxY, node.y + rect.height);
        }
      });

      const padding = 40;
      const width = maxX - minX + padding * 2;
      const height = maxY - minY + padding * 2;
      const offsetX = -minX + padding;
      const offsetY = -minY + padding;

      let svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#586069"/>
    </marker>
    <marker id="arrowThickExport" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#586069"/>
    </marker>
  </defs>
  
  <!-- Connexions -->
`;

      state.connections.forEach(conn => {
        const fromNode = state.nodes.find(n => n.id === conn.from);
        const toNode = state.nodes.find(n => n.id === conn.to);
        if (!fromNode || !toNode) return;

        const from = getNodeCenter(fromNode);
        const to = getNodeCenter(toNode);
        const midX = (from.x + to.x) / 2 + offsetX;
        const midY = (from.y + to.y) / 2 + offsetY;

        let lineAttrs = `x1="${from.x + offsetX}" y1="${from.y + offsetY}" x2="${to.x + offsetX}" y2="${to.y + offsetY}" stroke="#586069" fill="none"`;
        
        switch (conn.arrowType) {
          case 'simple':
            lineAttrs += ` stroke-width="2" marker-end="url(#arrow)"`;
            break;
          case 'double':
            lineAttrs += ` stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"`;
            break;
          case 'dashed':
            lineAttrs += ` stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrow)"`;
            break;
          case 'thick':
            lineAttrs += ` stroke-width="4" marker-end="url(#arrowThickExport)"`;
            break;
        }

        svg += `  <line ${lineAttrs}/>\n`;
        
        if (conn.label) {
          const textWidth = conn.label.length * 7 + 10;
          svg += `  <rect x="${midX - textWidth/2}" y="${midY - 16}" width="${textWidth}" height="20" rx="4" fill="white" stroke="#e1e4e8"/>\n`;
          svg += `  <text x="${midX}" y="${midY}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="600" fill="#586069">${conn.label}</text>\n`;
        }
      });

      svg += `\n  <!-- Nœuds -->\n`;

      state.nodes.forEach(node => {
        const el = document.querySelector(`[data-id="${node.id}"]`);
        if (!el) return;
        
        const rect = el.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        const x = node.x + offsetX;
        const y = node.y + offsetY;
        const fill = node.type === 'terminal' ? node.color : 'white';
        const textColor = node.type === 'terminal' ? 'white' : '#24292e';

        switch (node.type) {
          case 'terminal':
            svg += `  <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${h/2}" fill="${fill}" stroke="${node.color}" stroke-width="2"/>\n`;
            break;
          case 'process':
            svg += `  <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="8" fill="${fill}" stroke="${node.color}" stroke-width="2"/>\n`;
            break;
          case 'decision':
            svg += `  <rect x="${x + w/2}" y="${y}" width="${Math.max(w,h)}" height="${Math.max(w,h)}" rx="8" fill="${fill}" stroke="${node.color}" stroke-width="2" transform="rotate(45 ${x + w/2} ${y + h/2})"/>\n`;
            break;
          case 'io':
            svg += `  <path d="M ${x + w*0.1} ${y} L ${x + w} ${y} L ${x + w*0.9} ${y + h} L ${x} ${y + h} Z" fill="${fill}" stroke="${node.color}" stroke-width="2"/>\n`;
            break;
          case 'document':
            svg += `  <rect x="${x}" y="${y}" width="${w}" height="${h-10}" fill="${fill}" stroke="${node.color}" stroke-width="2"/>\n`;
            svg += `  <path d="M ${x} ${y+h-10} Q ${x+w/4} ${y+h-5} ${x+w/2} ${y+h-10} T ${x+w} ${y+h-10} L ${x+w} ${y+h-6} Q ${x+3*w/4} ${y+h-11} ${x+w/2} ${y+h-6} T ${x} ${y+h-6} Z" fill="${fill}" stroke="${node.color}" stroke-width="2"/>\n`;
            break;
        }

        svg += `  <text x="${x + w/2}" y="${y + h/2}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="500" fill="${textColor}">${node.text}</text>\n`;
      });

      svg += `</svg>`;

      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'logigramme.svg';
      a.click();
      URL.revokeObjectURL(url);
    });

    render();
  </script>
</body>
</html>
